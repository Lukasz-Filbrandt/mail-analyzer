<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📧 MailAnalyzer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card2: #16213e;
    --border: #2a2a4a;
    --text: #e8e8f0;
    --text-muted: #888;
    --accent: #6c63ff;
    --zwrot: #f97316;
    --reklamacja: #ef4444;
    --zapytanie: #3b82f6;
    --oferta: #a855f7;
    --inne: #6b7280;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOP BAR */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }

  .stats-bar {
    display: flex;
    gap: 10px;
    flex: 1;
    overflow-x: auto;
    padding: 4px 0;
  }

  .stat-pill {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.15s;
  }

  .stat-pill:hover { border-color: var(--accent); }

  .topbar-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #5a52e0; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--card2); }

  .btn-icon {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    width: 38px;
    height: 38px;
    padding: 0;
    border-radius: 8px;
    font-size: 18px;
    justify-content: center;
  }
  .btn-icon:hover { background: var(--card2); }

  /* MAIN LAYOUT */
  .main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    background: var(--card);
    border-right: 1px solid var(--border);
    padding: 16px 12px;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 8px;
    padding: 0 4px;
  }

  .filter-btn {
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    transition: background 0.15s;
    margin-bottom: 2px;
  }

  .filter-btn:hover { background: var(--card2); }
  .filter-btn.active { background: var(--card2); font-weight: 600; }

  .filter-left { display: flex; align-items: center; gap: 8px; }

  .cat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .count-badge {
    background: var(--border);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* CONTENT AREA */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  /* PROGRESS BAR */
  .progress-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 14px;
  }

  .progress-bar.visible { display: flex; }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-text { font-size: 13px; color: var(--text-muted); white-space: nowrap; }

  /* EMAIL CARD */
  .email-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }

  .email-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .email-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 12px;
  }

  .email-sender { font-size: 13px; color: var(--text-muted); }
  .email-sender strong { color: var(--text); font-size: 14px; }

  .email-time {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .email-subject {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .email-summary {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .email-summary.pending { opacity: 0.5; }

  .email-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .badge {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-zwrot    { background: rgba(249,115,22,0.15); color: var(--zwrot); border: 1px solid rgba(249,115,22,0.3); }
  .badge-reklamacja { background: rgba(239,68,68,0.15); color: var(--reklamacja); border: 1px solid rgba(239,68,68,0.3); }
  .badge-zapytanie  { background: rgba(59,130,246,0.15); color: var(--zapytanie); border: 1px solid rgba(59,130,246,0.3); }
  .badge-oferta   { background: rgba(168,85,247,0.15); color: var(--oferta); border: 1px solid rgba(168,85,247,0.3); }
  .badge-inne     { background: rgba(107,114,128,0.15); color: var(--inne); border: 1px solid rgba(107,114,128,0.3); }

  .badge-wysoki  { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .badge-sredni  { background: rgba(234,179,8,0.15); color: var(--yellow); border: 1px solid rgba(234,179,8,0.3); }
  .badge-niski   { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }

  .badge-reply { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }

  .no-emails {
    text-align: center;
    color: var(--text-muted);
    padding: 60px 20px;
    font-size: 14px;
  }

  /* DETAIL VIEW */
  .detail-view { display: none; }
  .detail-view.active { display: block; }
  .list-view.hidden { display: none; }

  .detail-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .detail-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .detail-meta {
    display: grid;
    gap: 6px;
    margin-bottom: 16px;
  }

  .detail-meta-row {
    display: flex;
    gap: 8px;
    font-size: 13px;
  }

  .detail-meta-label {
    color: var(--text-muted);
    width: 60px;
    flex-shrink: 0;
  }

  .detail-body {
    background: var(--bg);
    border-radius: 8px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    border: 1px solid var(--border);
  }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .ai-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .ai-grid-item { display: flex; flex-direction: column; gap: 4px; }
  .ai-grid-item label { font-size: 11px; color: var(--text-muted); }

  .key-info-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .key-info-list li {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .key-info-list li::before {
    content: "•";
    color: var(--accent);
    font-size: 16px;
    line-height: 1;
    flex-shrink: 0;
  }

  .reply-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.6;
    resize: vertical;
    min-height: 140px;
    margin-bottom: 12px;
    font-family: inherit;
    transition: border-color 0.15s;
  }

  .reply-textarea:focus { outline: none; border-color: var(--accent); }

  .reply-actions { display: flex; gap: 8px; }

  .btn-send {
    background: var(--green);
    color: #fff;
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-send:hover { background: #16a34a; }

  .no-analysis {
    background: var(--bg);
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 560px;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .modal-title { font-size: 18px; font-weight: 700; }

  .btn-close {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    padding: 2px;
  }
  .btn-close:hover { color: var(--text); }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: monospace;
    transition: border-color 0.15s;
  }
  .form-input:focus { outline: none; border-color: var(--accent); }

  /* SUMMARY MODAL CONTENT */
  .summary-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .summary-stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }

  .summary-stat-num { font-size: 28px; font-weight: 700; color: var(--accent); }
  .summary-stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .summary-text {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1e1e3a;
    border: 1px solid var(--green);
    color: var(--green);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    z-index: 200;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.25s ease;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    flex-shrink: 0;
  }

  /* Replied indicator */
  .email-card.replied { opacity: 0.65; }
  .email-card.replied .email-subject::after {
    content: " ✓";
    color: var(--green);
    font-weight: 700;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .stats-bar { display: none; }
    .btn-primary span { display: none; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">📧 MailAnalyzer</div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-pill" onclick="setFilter('all')">📬 Wszystkie: <strong id="statAll">8</strong></div>
    <div class="stat-pill" style="color:var(--zwrot)" onclick="setFilter('Zwrot')">📦 Zwrot: <strong id="statZwrot">0</strong></div>
    <div class="stat-pill" style="color:var(--reklamacja)" onclick="setFilter('Reklamacja')">😤 Reklamacja: <strong id="statReklamacja">0</strong></div>
    <div class="stat-pill" style="color:var(--zapytanie)" onclick="setFilter('Zapytanie')">❓ Zapytanie: <strong id="statZapytanie">0</strong></div>
    <div class="stat-pill" style="color:var(--oferta)" onclick="setFilter('Oferta biznesowa')">💼 Oferta: <strong id="statOferta">0</strong></div>
    <div class="stat-pill" style="color:var(--inne)" onclick="setFilter('Inne')">✅ Inne: <strong id="statInne">0</strong></div>
  </div>

  <div class="topbar-actions">
    <button class="btn btn-primary" id="analyzeBtn" onclick="analyzeAll()">
      <span class="spinner" id="analyzeSpinner" style="display:none"></span>
      🔍 <span>Analizuj wszystkie</span>
    </button>
    <button class="btn btn-ghost" onclick="openSummaryModal()">📊 <span>Podsumowanie</span></button>
    <button class="btn btn-icon" onclick="openSettingsModal()" title="Ustawienia">⚙️</button>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="main-layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-title">Kategorie</div>
    <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">
      <div class="filter-left"><div class="cat-dot" style="background:#888"></div>Wszystkie</div>
      <div class="count-badge" id="cnt-all">8</div>
    </button>
    <button class="filter-btn" id="filter-Zwrot" onclick="setFilter('Zwrot')">
      <div class="filter-left"><div class="cat-dot" style="background:var(--zwrot)"></div>📦 Zwrot</div>
      <div class="count-badge" id="cnt-Zwrot">0</div>
    </button>
    <button class="filter-btn" id="filter-Reklamacja" onclick="setFilter('Reklamacja')">
      <div class="filter-left"><div class="cat-dot" style="background:var(--reklamacja)"></div>😤 Reklamacja</div>
      <div class="count-badge" id="cnt-Reklamacja">0</div>
    </button>
    <button class="filter-btn" id="filter-Zapytanie" onclick="setFilter('Zapytanie')">
      <div class="filter-left"><div class="cat-dot" style="background:var(--zapytanie)"></div>❓ Zapytanie</div>
      <div class="count-badge" id="cnt-Zapytanie">0</div>
    </button>
    <button class="filter-btn" id="filter-Oferta biznesowa" onclick="setFilter('Oferta biznesowa')">
      <div class="filter-left"><div class="cat-dot" style="background:var(--oferta)"></div>💼 Oferta biz.</div>
      <div class="count-badge" id="cnt-Oferta biznesowa">0</div>
    </button>
    <button class="filter-btn" id="filter-Inne" onclick="setFilter('Inne')">
      <div class="filter-left"><div class="cat-dot" style="background:var(--inne)"></div>✅ Inne</div>
      <div class="count-badge" id="cnt-Inne">0</div>
    </button>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <!-- Progress -->
    <div class="progress-bar" id="progressBar">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Analizuję...</div>
    </div>

    <!-- List View -->
    <div id="listView">
      <div id="emailList"></div>
    </div>

    <!-- Detail View -->
    <div class="detail-view" id="detailView">
      <div class="detail-header">
        <button class="btn btn-ghost" onclick="closeDetail()">← Powrót</button>
        <div style="flex:1"></div>
        <div id="detailBadges" style="display:flex;gap:6px"></div>
      </div>
      <div class="detail-card">
        <div class="detail-meta" id="detailMeta"></div>
        <div class="detail-body" id="detailBody"></div>
      </div>
      <div class="detail-card" id="detailAnalysis"></div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal" onclick="closeModalOnOverlay(event,'settingsModal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">⚙️ Ustawienia</div>
      <button class="btn-close" onclick="closeModal('settingsModal')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Klucz API Anthropic</label>
      <input type="password" class="form-input" id="apiKeyInput" placeholder="sk-ant-...">
      <div style="font-size:11px;color:var(--text-muted);margin-top:6px">Klucz jest zapisywany tylko lokalnie w przeglądarce.</div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-primary" onclick="saveApiKey()">💾 Zapisz klucz</button>
      <button class="btn btn-ghost" onclick="resetAnalysis()">🔄 Zresetuj analizę</button>
    </div>
  </div>
</div>

<!-- SUMMARY MODAL -->
<div class="modal-overlay" id="summaryModal" onclick="closeModalOnOverlay(event,'summaryModal')">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <div class="modal-title">📊 Podsumowanie dnia</div>
      <button class="btn-close" onclick="closeModal('summaryModal')">×</button>
    </div>
    <div id="summaryContent">
      <div style="text-align:center;padding:30px;color:var(--text-muted)">Ładowanie podsumowania...</div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

let currentFilter = 'all';
let currentEmailId = null;
let analyzing = false;

// ============================================================
// HELPERS
// ============================================================
function getApiKey() {
  return localStorage.getItem('email_analyzer_key') || '';
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('pl-PL', {hour:'2-digit', minute:'2-digit'});
}

function senderName(from) {
  const name = from.split('@')[0].replace(/[._]/g, ' ');
  return name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

function catClass(cat) {
  if (!cat) return 'inne';
  const map = {'Zwrot':'zwrot','Reklamacja':'reklamacja','Zapytanie':'zapytanie','Oferta biznesowa':'oferta','Inne':'inne'};
  return map[cat] || 'inne';
}

function catColor(cat) {
  const map = {'Zwrot':'var(--zwrot)','Reklamacja':'var(--reklamacja)','Zapytanie':'var(--zapytanie)','Oferta biznesowa':'var(--oferta)','Inne':'var(--inne)'};
  return map[cat] || 'var(--inne)';
}

function catIcon(cat) {
  const map = {'Zwrot':'📦','Reklamacja':'😤','Zapytanie':'❓','Oferta biznesowa':'💼','Inne':'✅'};
  return map[cat] || '✅';
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color || 'var(--green)';
  t.style.color = color || 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
// RENDER
// ============================================================
function renderAll() {
  updateStats();
  renderList();
}

function updateStats() {
  const cats = ['Zwrot','Reklamacja','Zapytanie','Oferta biznesowa','Inne'];
  document.getElementById('statAll').textContent = emails.length;
  document.getElementById('cnt-all').textContent = emails.length;
  cats.forEach(c => {
    const n = emails.filter(e => e.category === c).length;
    const shortId = c.replace(' ','\\\ ');
    const el1 = document.getElementById('stat' + c.replace(' biznesowa','').replace(' ',''));
    const el2 = document.getElementById('cnt-' + c);
    if (el1) el1.textContent = n;
    if (el2) el2.textContent = n;
  });
  // stats bar
  document.getElementById('statZwrot').textContent = emails.filter(e=>e.category==='Zwrot').length;
  document.getElementById('statReklamacja').textContent = emails.filter(e=>e.category==='Reklamacja').length;
  document.getElementById('statZapytanie').textContent = emails.filter(e=>e.category==='Zapytanie').length;
  document.getElementById('statOferta').textContent = emails.filter(e=>e.category==='Oferta biznesowa').length;
  document.getElementById('statInne').textContent = emails.filter(e=>e.category==='Inne').length;
}

function renderList() {
  const list = document.getElementById('emailList');
  let filtered = currentFilter === 'all' ? emails : emails.filter(e => e.category === currentFilter);

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-emails">Brak maili w tej kategorii.</div>';
    return;
  }

  list.innerHTML = filtered.map(email => {
    const cc = catClass(email.category);
    const priorityCls = email.priority ? 'badge-' + email.priority : '';
    return `<div class="email-card ${email.replied?'replied':''}" onclick="openDetail(${email.id})"
        style="border-left-color:${email.category ? catColor(email.category) : 'transparent'}">
      <div class="email-card-top">
        <div class="email-sender"><strong>${senderName(email.from)}</strong><br>${email.from}</div>
        <div class="email-time">${formatTime(email.receivedAt)}</div>
      </div>
      <div class="email-subject">${escHtml(email.subject)}</div>
      <div class="email-summary ${email.analyzed?'':'pending'}">${email.summary ? escHtml(email.summary) : 'Nie przeanalizowano'}</div>
      <div class="email-badges">
        ${email.category ? `<span class="badge badge-${cc}">${catIcon(email.category)} ${email.category}</span>` : ''}
        ${email.priority ? `<span class="badge badge-${email.priority}">${email.priority === 'wysoki' ? '🔴' : email.priority === 'sredni' ? '🟡' : '🟢'} ${email.priority}</span>` : ''}
        ${email.needsHumanReview ? `<span class="badge" style="background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.3)">👤 Wymaga uwagi</span>` : ''}
        ${email.suggestedReply ? `<span class="badge badge-reply">💬 Gotowa odpowiedź</span>` : ''}
        ${email.replied ? `<span class="badge" style="background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.3)">✅ Wysłano</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const fb = document.getElementById('filter-' + f);
  if (fb) fb.classList.add('active');
  closeDetail();
  renderList();
}

// ============================================================
// DETAIL VIEW
// ============================================================
function openDetail(id) {
  const email = emails.find(e => e.id === id);
  if (!email) return;
  currentEmailId = id;

  document.getElementById('listView').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';

  // Badges
  const badges = document.getElementById('detailBadges');
  let badgesHtml = '';
  if (email.category) badgesHtml += `<span class="badge badge-${catClass(email.category)}">${catIcon(email.category)} ${email.category}</span>`;
  if (email.priority) badgesHtml += `<span class="badge badge-${email.priority}">${email.priority}</span>`;
  if (email.needsHumanReview) badgesHtml += `<span class="badge" style="background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.3)">👤 Wymaga uwagi</span>`;
  badges.innerHTML = badgesHtml;

  // Meta
  document.getElementById('detailMeta').innerHTML = `
    <div class="detail-meta-row"><span class="detail-meta-label">Od:</span><span>${escHtml(email.from)}</span></div>
    <div class="detail-meta-row"><span class="detail-meta-label">Temat:</span><strong>${escHtml(email.subject)}</strong></div>
    <div class="detail-meta-row"><span class="detail-meta-label">Data:</span><span>${new Date(email.receivedAt).toLocaleString('pl-PL')}</span></div>
  `;

  // Body
  document.getElementById('detailBody').textContent = email.body;

  // Analysis
  renderDetailAnalysis(email);
}

function renderDetailAnalysis(email) {
  const cont = document.getElementById('detailAnalysis');
  if (!email.analyzed) {
    cont.innerHTML = `<div class="section-title">🤖 Analiza AI</div>
      <div class="no-analysis">Ten mail nie został jeszcze przeanalizowany.<br>Kliknij "Analizuj wszystkie" aby uruchomić analizę.</div>`;
    return;
  }

  const keyInfoHtml = (email.keyInfo||[]).map(k => `<li>${escHtml(k)}</li>`).join('');

  cont.innerHTML = `
    <div class="section-title">🤖 Analiza AI</div>
    <div class="ai-grid">
      <div class="ai-grid-item">
        <label>Kategoria</label>
        <span class="badge badge-${catClass(email.category)}" style="display:inline-flex;width:fit-content">${catIcon(email.category)} ${email.category}</span>
      </div>
      <div class="ai-grid-item">
        <label>Priorytet</label>
        <span class="badge badge-${email.priority}" style="display:inline-flex;width:fit-content">${email.priority === 'wysoki' ? '🔴' : email.priority === 'sredni' ? '🟡' : '🟢'} ${email.priority}</span>
      </div>
    </div>
    <div style="margin-bottom:14px">
      <div class="section-title">Podsumowanie</div>
      <div style="font-size:13px;line-height:1.6;color:var(--text)">${escHtml(email.summary)}</div>
    </div>
    ${keyInfoHtml ? `<div style="margin-bottom:16px">
      <div class="section-title">Kluczowe informacje</div>
      <ul class="key-info-list">${keyInfoHtml}</ul>
    </div>` : ''}
    ${email.suggestedReply ? `<div>
      <div class="section-title">💬 Sugerowana odpowiedź</div>
      <textarea class="reply-textarea" id="replyTextarea">${escHtml(email.suggestedReply)}</textarea>
      <div class="reply-actions">
        <button class="btn-send" onclick="sendReply(${email.id})" ${email.replied?'disabled style="opacity:0.5"':''}>
          ${email.replied ? '✅ Wysłano' : '✅ Wyślij odpowiedź'}
        </button>
      </div>
    </div>` : ''}
  `;
}

function closeDetail() {
  currentEmailId = null;
  document.getElementById('listView').style.display = '';
  document.getElementById('detailView').style.display = 'none';
}

function sendReply(id) {
  const email = emails.find(e => e.id === id);
  if (!email) return;
  email.replied = true;
  showToast('✅ Odpowiedź wysłana!');
  renderDetailAnalysis(email);
  updateStats();
  renderList();
}

// ============================================================
// ANALYZE
// ============================================================
async function analyzeAll() {
  if (analyzing) return;

  const key = getApiKey();
  if (!key) {
    alert('Najpierw wpisz klucz API w ustawieniach ⚙️');
    openSettingsModal();
    return;
  }

  const unanalyzed = emails.filter(e => !e.analyzed);
  if (unanalyzed.length === 0) {
    showToast('✅ Wszystkie maile już przeanalizowane');
    return;
  }

  analyzing = true;
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('analyzeSpinner').style.display = 'flex';

  const progressBar = document.getElementById('progressBar');
  progressBar.classList.add('visible');

  let done = 0;
  const total = unanalyzed.length;

  for (const email of unanalyzed) {
    document.getElementById('progressText').textContent = `Analizuję ${done + 1}/${total}...`;
    document.getElementById('progressFill').style.width = (done / total * 100) + '%';

    try {
      const result = await callAnalyzeAPI(key, email);
      email.category = result.category || 'Inne';
      email.priority = result.priority || 'niski';
      email.summary = result.summary || '';
      email.keyInfo = result.keyInfo || [];
      email.suggestedReply = result.suggestedReply || null;
      email.needsHumanReview = result.needsHumanReview || false;
      email.analyzed = true;
    } catch (err) {
      console.error('Error analyzing email', email.id, err);
      email.category = 'Inne';
      email.priority = 'sredni';
      email.summary = 'Błąd analizy: ' + err.message;
      email.keyInfo = [];
      email.suggestedReply = '';
      email.needsHumanReview = true;
      email.analyzed = true;
    }

    done++;
    renderAll();

    // If detail view is open for this email, refresh it
    if (currentEmailId === email.id) {
      renderDetailAnalysis(email);
    }
  }

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = '✅ Analiza zakończona';
  setTimeout(() => {
    progressBar.classList.remove('visible');
    document.getElementById('progressFill').style.width = '0';
  }, 2500);

  analyzing = false;
  btn.disabled = false;
  document.getElementById('analyzeSpinner').style.display = 'none';
  showToast('✅ Analiza zakończona — przeanalizowano ' + done + ' maili');
}

async function callAnalyzeAPI(apiKey, email) {
  const userPrompt = `Przeanalizuj tego maila i zwróć JSON:
{
  "category": "Zwrot" lub "Reklamacja" lub "Zapytanie" lub "Oferta biznesowa" lub "Inne",
  "priority": "wysoki" lub "sredni" lub "niski",
  "summary": "max 2 zdania co klient chce",
  "keyInfo": ["najważniejsza info 1", "najważniejsza info 2"],
  "suggestedReply": "gotowa odpowiedź po polsku, profesjonalna, zaczynająca się od Dzień dobry",
  "needsHumanReview": true lub false
}

Mail od: ${email.from}
Temat: ${email.subject}
Treść: ${email.body}`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-request-proxy': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1024,
      system: 'Jesteś asystentem AI dla sklepu e-commerce. Analizujesz maile klientów i dostawców. Odpowiadasz TYLKO w formacie JSON bez żadnych komentarzy ani markdown.',
      messages: [{ role: 'user', content: userPrompt }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${response.status}`);
  }

  const data = await response.json();
  const raw = data.content[0].text;
  console.log('Raw API response:', raw);

  const cleaned = raw.replace(/```json\n?/gi, '').replace(/```\n?/gi, '').trim();
  try {
    return JSON.parse(cleaned);
  } catch (e) {
    console.error('Parse error:', e.message, '\nCleaned text:', cleaned);
    return {
      category: 'Inne',
      priority: 'sredni',
      summary: 'Nie udało się przeanalizować automatycznie',
      keyInfo: [],
      suggestedReply: '',
      needsHumanReview: true
    };
  }
}

// ============================================================
// DAILY SUMMARY
// ============================================================

  try {

        'anthropic-version': '2023-06-01',

      },
      body: JSON.stringify({

        system: 'Jesteś asystentem AI dla sklepu e-commerce. Odpowiadasz po polsku, krótko i konkretnie.',
        messages: [{
          role: 'user',
          content: `Na podstawie poniższych maili ze sklepu e-commerce z dnia dzisiejszego, napisz krótkie podsumowanie dnia (max 200 słów) zawierające:\n1. Najważniejsze sprawy wymagające pilnej uwagi\n2. Ogólne wzorce/trendy\n3. Sugestie priorytetów na dziś\n\nMaile:\n${emailsSummary}`

  } catch (err) {
    document.getElementById('summaryContent').innerHTML = statsHtml + `
      <div class="no-analysis">Błąd generowania podsumowania: ${escHtml(err.message)}</div>`;
  }
}

// ============================================================
// SETTINGS
// ============================================================
function openSettingsModal() {
  document.getElementById('apiKeyInput').value = getApiKey();
  document.getElementById('settingsModal').classList.add('active');
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (key) {
    localStorage.setItem('email_analyzer_key', key);
    showToast('✅ Klucz API zapisany');
    closeModal('settingsModal');
  } else {
    showToast('⚠️ Wprowadź klucz API', 'var(--yellow)');
  }
}

function resetAnalysis() {
  emails.forEach(e => {
    e.category = null; e.priority = null; e.summary = null;
    e.keyInfo = null; e.suggestedReply = null;
    e.needsHumanReview = null; e.analyzed = false; e.replied = false;
  });
  closeModal('settingsModal');
  closeDetail();
  renderAll();
  showToast('🔄 Analiza zresetowana');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

function closeModalOnOverlay(event, id) {
  if (event.target === document.getElementById(id)) closeModal(id);
}

// ============================================================
// INIT
// ============================================================
renderAll();
</script>
